<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4NDR0-Editor • Tri-Mode</title>
  
  <!-- External Libraries -->
  <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown@7.1.2/dist/turndown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/turndown-plugin-gfm@1.0.2/dist/turndown-plugin-gfm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.1.0/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.7.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-docx-js@0.3.1/dist/html-docx.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/split.js@1.6.5/dist/split.min.js"></script>

  <style>
    :root {
      --bg-dark-base: #050A0F;
      --bg-glass-panel: rgba(10, 19, 26, 0.35);
      --accent-cyan: #00E5FF;
      --text-cyan-active: #67E8F9;
      --accent-cyan-border-idle: rgba(0, 229, 255, 0.2);
      --text-primary: #EAEAEA;
      --text-secondary: #9E9E9E;
      --font-body: 'Roboto Mono', monospace;
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark-base);
      color: var(--text-primary);
      font-family: var(--font-body);
      height: 100vh;
      overflow: hidden;
    }

    .header {
      background: var(--bg-glass-panel);
      border-bottom: 1px solid var(--accent-cyan-border-idle);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(12px);
    }

    .header .title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.4rem;
      color: var(--accent-cyan);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header .title .glyph {
      font-size: 1.6rem;
    }

    .main-container {
      height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
    }

    .pane {
      background: #0a131a;
      border: 1px solid var(--accent-cyan-border-idle);
      overflow: hidden;
    }

    .CodeMirror {
      height: 100% !important;
      font-size: 14px;
    }

    .toolbar {
      padding: 8px 12px;
      background: rgba(5, 10, 15, 0.8);
      border-bottom: 1px solid var(--accent-cyan-border-idle);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--accent-cyan-border-idle);
      color: var(--text-secondary);
      padding: 6px 12px;
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      color: var(--accent-cyan);
      border-color: var(--accent-cyan);
      background: rgba(0, 229, 255, 0.08);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">
      <span class="glyph">Ψ</span>
      <span>4NDR0-Editor</span>
    </div>
    <div style="color: var(--text-secondary); font-size: 0.85rem;">
      Tri-Mode • Live Sync • DOCX
    </div>
  </div>

  <div class="main-container" id="mainContainer">
    <!-- Content will be injected by app.js -->
  </div>

  <script src="/tools/4ndr0-editor/app.js"></script>
</body>
</html>
