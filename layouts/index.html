<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.33.2/js/jquery.terminal.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.33.2/css/jquery.terminal.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-dark-base: #050A0F; --accent-cyan: #00E5FF; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050A0F; color: #00E5FF; font-family: 'Roboto Mono', monospace; overflow: hidden; }
        #cortex-terminal { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1000; }
        body::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 10; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .terminal, .cmd { text-shadow: 0 0 8px rgba(0, 229, 255, 0.4); background-color: transparent !important; }
    </style>
</head>
<body>
    {{ partial "index_terminal_logic.html" . }}
</body>
</html>
