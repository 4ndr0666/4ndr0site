<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{{ .Site.Title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://cdn.jsdelivr.net/npm/jquery"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.33.2/js/jquery.terminal.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.33.2/css/jquery.terminal.min.css" rel="stylesheet"/>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-dark-base: #050A0F;
            --accent-cyan: #00E5FF;
            --text-cyan-active: #67E8F9;
            --accent-cyan-border-idle: rgba(0, 229, 255, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark-base);
            color: var(--accent-cyan);
            font-family: 'Roboto Mono', monospace;
            overflow: hidden;
        }

        #4ndr0-terminal {
            height: 100vh; width: 100vw;
            --size: 1.2;
            --color: var(--accent-cyan);
            --background: var(--bg-dark-base);
        }

        /* SCANLINE EFFECT */
        body::after {
            content: " ";
            display: block; position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .terminal { text-shadow: 0 0 8px rgba(0, 229, 255, 0.4); }
        .terminal::-webkit-scrollbar { width: 6px; }
        .terminal::-webkit-scrollbar-thumb { 
            background: var(--accent-cyan-border-idle); 
            border-radius: 3px; 
        }
    </style>
</head>
<body>
    <div id="4ndr0-terminal"></div>

    <div id="glyph-container" style="display:none;">
        <svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="#00E5FF" stroke-width="3">
            <path d="M 64,12 A 52,52 0 1 1 63.9,12 Z" stroke-dasharray="21.78 21.78" stroke-width="2" />
            <path d="M 64,20 A 44,44 0 1 1 63.9,20 Z" stroke-dasharray="10 10" stroke-width="1.5" opacity="0.7" />
            <path d="M64 30 L91.3 47 L91.3 81 L64 98 L36.7 81 L36.7 47 Z" />
            <text x="64" y="75" text-anchor="middle" fill="#00E5FF" stroke="none" font-size="56" font-weight="700" font-family="serif">Ψ</text>
        </svg>
    </div>

    <script>
    jQuery(document).ready(function($) {
        const greeting = `{{ .Site.Params.terminal.greeting | safeJS }}`;
        
        const term = $('#4ndr0-terminal').terminal({
            help: function() {
                this.echo("\n[[b;white;]OPERATIONAL COMMANDS:]");
                this.echo("  [[b;cyan;]startx]\t- AUTHORIZE GUI BOOT");
                this.echo("  [[b;cyan;]whois]\t- IDENTITY QUERY");
                this.echo("  [[b;cyan;]clear]\t- PURGE BUFFER");
                this.echo("  [[b;cyan;]exit]\t- DISCONNECT SESSION\n");
            },
            whois: function() {
                this.echo("\n[[b;grey;]Operator:]\t{{ .Site.Params.author }}");
                this.echo("[[b;grey;]Cortex:]\t\tOPERATIONAL");
                this.echo("[[b;grey;]Interface:]\tv5.0.0-Ψ\n");
            },
            startx: function() {
                this.echo("\n[[b;cyan;]BYPASSING CLI... INITIALIZING GUI]");
                let i = 0;
                const loader = setInterval(() => {
                    this.set_prompt("[" + "#".repeat(i) + "-".repeat(20 - i) + "] " + (i * 5) + "%");
                    if (i++ >= 20) {
                        clearInterval(loader);
                        window.location.href = "{{ `posts/` | relURL }}";
                    }
                }, 40);
            },
            exit: function() {
                this.echo("TERMINATING UPLINK...");
                setTimeout(() => { window.location.href = "{{ .Site.Params.terminal.exitLocation | relURL }}"; }, 1000);
            }
        }, {
            greetings: greeting,
            prompt: '4ndr0666@cortex > ',
            checkArity: false
        });

        // DYNAMIC PROMPT
        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => { term.set_prompt(`4ndr0666@${data.ip} > `); })
            .catch(() => {});
    });
    </script>
</body>
</html>
