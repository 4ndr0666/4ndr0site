{{ define "main" }}

{{ partial "banner.html" . }}

<section class="section 4ndr0-home-env py-5">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 mx-auto">
        
        <div class="hud-index-header mb-5">
          <h2 class="h4 mb-0 text-cyan-active text-uppercase" style="font-family: var(--primary_font); letter-spacing: 2px;">
            <span class="opacity-50">SYSTEM_FEED:</span> LATEST_UPLINKS
          </h2>
          <div class="header-scanline" style="width: 100%; height: 2px; background: var(--accent-cyan); margin-top: 15px; box-shadow: 0 0 10px var(--glow-cyan-active);"></div>
        </div>

        <div class="glass-panel p-4 p-md-5 hud-home-node">
          <div class="node-stream">
            {{ range where site.RegularPages "Section" "in" site.Params.mainSections }}
              <div class="node-entry mb-4">
                {{ .Render "article" }}
              </div>
            {{ end }}
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<style>
  .4ndr0-home-env { font-family: var(--primary_font); }
  
  .hud-home-node {
    border: 1px solid var(--accent-cyan-border-idle) !important;
    background: var(--bg-glass-panel) !important;
  }

  .node-entry {
    border-bottom: 1px solid rgba(0, 229, 255, 0.1);
    padding-bottom: 1.5rem;
  }
  .node-entry:last-child { border-bottom: none; }

  /* PURGE LEGACY UI ELEMENTS AND CTA BLOAT */
  .banner, 
  .banner-creative, 
  .bg-body, 
  .shadow, 
  .block, 
  .illustration, 
  .illustration-mobile,
  .btn-primary {
    display: none !important;
  }
</style>

{{ end }}
