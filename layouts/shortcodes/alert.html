<div class="hud-hazard-node glass-panel mb-4 {{ with .Get `theme` }}alert-{{ . }}{{ end }}" 
     role="alert" 
     data-dir="{{ with .Get `dir` }}{{ . }}{{ else }}ltr{{ end }}">
  
  <div class="hazard-header d-flex align-items-center p-2">
    <div class="hazard-blink"></div>
    <span class="hazard-label">[ 
      {{ if eq (.Get "theme") "danger" }}CRITICAL_HAZARD{{ else if eq (.Get "theme") "warning" }}SYSTEM_WARNING{{ else }}DATA_INTERCEPT{{ end }} 
    ]</span>
    <span class="hazard-code ml-auto">0x{{ with .Get "theme" }}{{ . | upper }}{{ else }}NULL{{ end }}</span>
  </div>

  <div class="hazard-body p-3">
    <div class="hazard-content">
      {{ .Inner | markdownify }}
    </div>
  </div>
  
  <div class="hazard-footer">
    <div class="scanline-minimal"></div>
  </div>
</div>

<style>
  .hud-hazard-node {
    border: 1px solid var(--accent-cyan-border-idle);
    font-family: var(--primary_font);
    overflow: hidden;
    position: relative;
    background: var(--bg-glass-panel);
    transition: all 0.3s ease;
  }

  .hazard-header {
    background: rgba(0, 229, 255, 0.1);
    border-bottom: 1px solid var(--accent-cyan-border-idle);
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--accent-cyan);
  }

  .hazard-blink {
    width: 10px;
    height: 10px;
    background: var(--accent-cyan);
    margin-right: 10px;
    box-shadow: 0 0 8px var(--glow-cyan-active);
    animation: hazard-pulse 1.5s infinite;
  }

  .hazard-code { opacity: 0.5; font-size: 0.6rem; }

  .hazard-content {
    font-size: 0.95rem;
    line-height: 1.6;
    color: var(--text-cyan-active);
  }

  /* --- THEME OVERRIDES --- */

  /* DANGER / CRITICAL */
  .hud-hazard-node.alert-danger {
    border-color: #FF003C !important;
    box-shadow: 0 0 15px rgba(255, 0, 60, 0.3);
  }
  .hud-hazard-node.alert-danger .hazard-header {
    background: rgba(255, 0, 60, 0.2);
    color: #FF003C;
  }
  .hud-hazard-node.alert-danger .hazard-blink {
    background: #FF003C;
    box-shadow: 0 0 10px rgba(255, 0, 60, 0.8);
  }
  .hud-hazard-node.alert-danger .hazard-content {
    color: #FFB3C1;
  }

  /* WARNING */
  .hud-hazard-node.alert-warning {
    border-color: #FFD700;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.2);
  }
  .hud-hazard-node.alert-warning .hazard-header {
    background: rgba(255, 215, 0, 0.15);
    color: #FFD700;
  }
  .hud-hazard-node.alert-warning .hazard-blink {
    background: #FFD700;
  }

  @keyframes hazard-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .scanline-minimal {
    height: 1px;
    width: 100%;
    background: rgba(0, 229, 255, 0.1);
    position: absolute;
    bottom: 0;
    left: 0;
  }
</style>
