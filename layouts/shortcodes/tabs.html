{{ $_hugo_config := `{ "version": 1 }` }}

<div class="4ndr0-interface-switch glass-panel mb-5">
  <div class="hud-selector-bar d-flex flex-wrap p-1">
    </div>
  <div class="hud-buffer-content p-4">
    {{ .Inner }}
  </div>
</div>

<style>
  .4ndr0-interface-switch {
    border: 1px solid var(--accent-cyan-border-idle);
    overflow: hidden;
    font-family: var(--primary_font);
  }

  .hud-selector-bar {
    background: rgba(0, 229, 255, 0.08);
    border-bottom: 1px solid var(--accent-cyan-border-idle);
    gap: 5px;
  }

  .hud-tab-trigger {
    background: transparent;
    border: 1px solid transparent;
    color: var(--accent-cyan);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 0.5rem 1.25rem;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .hud-tab-trigger:hover {
    color: var(--text-cyan-active);
    background: rgba(0, 229, 255, 0.05);
  }

  .hud-tab-trigger.active {
    background: var(--accent-cyan-bg-active);
    color: var(--text-cyan-active);
    border: 1px solid var(--accent-cyan);
    box-shadow: 0 0 10px var(--glow-cyan-active);
    font-weight: 700;
  }

  .hud-tab-trigger.active::before {
    content: ">";
    position: absolute;
    left: 8px;
    font-size: 0.8rem;
  }

  .hud-buffer-content .tab-pane {
    display: none;
    animation: fadeInNode 0.4s ease-out forwards;
  }

  .hud-buffer-content .tab-pane.active {
    display: block;
  }

  @keyframes fadeInNode {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const containers = document.querySelectorAll('.4ndr0-interface-switch');
    
    containers.forEach((container, idx) => {
      const nav = container.querySelector('.hud-selector-bar');
      const panes = container.querySelectorAll('.tab-pane');
      
      panes.forEach((pane, pIdx) => {
        const title = pane.getAttribute('title') || `NODE_${pIdx}`;
        const btn = document.createElement('button');
        btn.className = `hud-tab-trigger ${pIdx === 0 ? 'active' : ''}`;
        btn.innerHTML = title;
        
        btn.onclick = () => {
          container.querySelectorAll('.hud-tab-trigger').forEach(b => b.classList.remove('active'));
          panes.forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          pane.classList.add('active');
        };
        
        nav.appendChild(btn);
        if(pIdx === 0) pane.classList.add('active');
      });
    });
  });
</script>
