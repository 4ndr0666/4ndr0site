{{ $_hugo_config := `{ "version": 1 }` }}

<div class="cortex-insight glass-panel my-5 p-4 transition-base">
  <div class="insight-header d-flex align-items-center mb-4">
    <div class="insight-glitch-bar"></div>
    <span class="insight-label text-uppercase">[ SYSTEM_INSIGHT_DECRYPTED ]</span>
  </div>
  
  <div class="insight-body">
    <div class="content-stream">
      {{ .Inner | markdownify }}
    </div>
    
    {{ with .Get "by"}}
    <div class="source-origin mt-4">
      <span class="origin-prefix">SOURCE_ORIGIN:</span>
      <span class="origin-id">// {{ . | upper }}</span>
    </div>
    {{ end }}
  </div>
</div>

<style>
  .cortex-insight {
    position: relative;
    border: 1px solid var(--accent-cyan-border-idle) !important;
    border-left: 4px solid var(--accent-cyan) !important;
    background: var(--bg-glass-panel) !important;
    font-family: var(--primary_font);
  }

  .cortex-insight:hover {
    border-left-width: 6px !important;
    box-shadow: -5px 0 20px rgba(0, 229, 255, 0.15) !important;
    transform: translateX(6px);
  }

  .insight-glitch-bar {
    width: 25px; height: 4px;
    background: var(--accent-cyan);
    margin-right: 15px;
    box-shadow: 0 0 10px var(--glow-cyan-active);
  }

  .insight-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--accent-cyan);
  }

  .content-stream {
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--text-cyan-active);
    font-style: italic;
  }

  .content-stream p:last-child { margin-bottom: 0; }

  .source-origin {
    font-size: 0.75rem;
    letter-spacing: 1px;
    border-top: 1px dashed var(--accent-cyan-border-idle);
    padding-top: 1rem;
    display: inline-block;
  }

  .origin-prefix {
    color: var(--accent-cyan);
    opacity: 0.5;
    margin-right: 8px;
  }

  .origin-id {
    color: var(--text-cyan-active);
    font-weight: bold;
    text-shadow: 0 0 5px var(--glow-cyan-active);
  }
</style>
