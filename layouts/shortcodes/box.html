<div class="4ndr0-sys-box glass-panel my-5 transition-base">
  <div class="box-header d-flex justify-content-between align-items-center p-2 px-3">
    <div class="box-status">
      <span class="status-square"></span> [ DATA_CONTAINER_V1 ]
    </div>
    <div class="box-meta opacity-75">
      SEC_LEVEL: <span class="text-cyan-active">UNRESTRICTED</span>
    </div>
  </div>
  
  <div class="box-content-frame p-4 position-relative">
    <div class="inner-text-stream">
      {{ .Inner | markdownify }}
    </div>
  </div>
</div>

<style>
  .4ndr0-sys-box {
    border: 1px solid var(--accent-cyan-border-idle) !important;
    background: var(--bg-glass-panel) !important;
    font-family: var(--primary_font);
    overflow: hidden;
    position: relative;
  }

  .4ndr0-sys-box:hover {
    border-color: var(--accent-cyan) !important;
    box-shadow: 0 0 15px var(--glow-cyan-active) !important;
  }

  .box-header {
    background: rgba(0, 229, 255, 0.08);
    border-bottom: 1px solid var(--accent-cyan-border-idle);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent-cyan);
  }

  .status-square {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent-cyan);
    margin-right: 8px;
    box-shadow: 0 0 5px var(--glow-cyan-active);
  }

  .inner-text-stream {
    color: var(--text-cyan-active);
    line-height: 1.6;
    font-size: 0.95rem;
    position: relative;
    z-index: 2;
  }

  /* Stabilized Scanline effect */
  .4ndr0-sys-box::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(10, 19, 26, 0) 50%, rgba(0, 229, 255, 0.03) 50%);
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 1;
  }
</style>
