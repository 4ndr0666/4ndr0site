<div class="4ndr0-sys-box glass-panel my-4">

      <span class="status-square"></span> [ DATA_CONTAINER_V1 ]
    </div>
    <div class="box-meta">
      SEC_LEVEL: <span class="text-cyan">UNRESTRICTED</span>

  <div class="box-content-frame p-4">

      {{ .Inner }}
    </div>
  </div>
</div>

    overflow: hidden;
    transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
  }

  .4ndr0-sys-box:hover {
    border-color: var(--accent-cyan);
    box-shadow: 0 0 15px var(--glow-cyan-active);
  }

  .box-header {
    background: rgba(0, 229, 255, 0.1);
    border-bottom: 1px solid var(--accent-cyan-border-idle);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--accent-cyan);
  }

  .status-square {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--accent-cyan);
    margin-right: 5px;
    box-shadow: 0 0 5px var(--glow-cyan-active);
  }

  .inner-text-stream {
    color: var(--text-color);
    line-height: 1.6;
    font-size: 0.95rem;
  }

  .text-cyan {
    color: var(--accent-cyan);
    font-weight: bold;
  }
