<h5 class="widget-title">
  <span class="status-pulse me-2"></span>{{ i18n "tags" | upper | default "DATA_TAGS" }}
</h5>

{{- if isset site.Taxonomies "tags" }}
  {{- if not (eq (len site.Taxonomies.tags) 0) }}
  <div class="hud-tag-cloud d-flex flex-wrap gap-2 mt-3">
    {{- range $name, $items := site.Taxonomies.tags }}
    <a class="hud-tag-node transition-base" href="{{ `tags/` | absLangURL }}{{ $name | urlize | lower }}">
      #{{ $name | humanize | upper }}
    </a>
    {{- end }}
  </div>
  {{- end }}
{{- end }}

<style>
  /* 4NDR0666OS Synchronized Tag Logic */
  .hud-tag-node {
    display: inline-block;
    font-size: 0.65rem !important;
    font-weight: 700;
    padding: 4px 10px;
    border: 1px solid var(--accent-cyan-border-idle) !important;
    color: var(--accent-cyan) !important;
    background: rgba(0, 229, 255, 0.03) !important;
    letter-spacing: 1px;
    text-decoration: none !important;
    border-radius: 2px;
  }
  
  .hud-tag-node:hover {
    background: var(--accent-cyan-bg-hover) !important;
    border-color: var(--accent-cyan) !important;
    color: var(--text-cyan-active) !important;
    box-shadow: 0 0 12px var(--glow-cyan-active) !important;
    transform: translateY(-3px) !important;
    text-shadow: 0 0 5px var(--glow-cyan-active);
  }

  /* Shared Animation Guard (Prevents re-declaration across multiple widgets) */
  @unless-defined pulse-tracking {
    @keyframes pulse-tracking {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  }
</style>
