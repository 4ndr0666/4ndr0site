<h5 class="widget-title">
  <span class="status-pulse me-2"></span> NAV_LOG
</h5>

<aside class="hud-toc-container">
  {{ .TableOfContents }}
</aside>

<style>
  .status-pulse {
    display: inline-block;
    width: 6px; height: 6px;
    background: #00FF41; /* Matrix Green to indicate active tracking */
    border-radius: 50%;
    box-shadow: 0 0 6px #00FF41;
    animation: pulse-tracking 2s infinite;
  }

  @keyframes pulse-tracking {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Targeting Hugo's Auto-Generated Markup Brutally */
  .hud-toc-container nav ul {
    list-style: none !important;
    margin-bottom: 0 !important;
  }

  /* 4NDR0666OS PATCH: Strip border from root UL, enforce on nested */
  .hud-toc-container #TableOfContents > ul {
    border-left: none !important;
    padding-left: 0 !important;
  }

  .hud-toc-container #TableOfContents ul ul {
    border-left: 1px dashed var(--accent-cyan-border-idle) !important;
    padding-left: 15px !important;
    margin-top: 5px;
  }

  .hud-toc-container nav ul li {
    margin-bottom: 8px !important;
    position: relative;
  }

  /* Connection Lines Aesthetic (Only for nested items to prevent overflow) */
  .hud-toc-container #TableOfContents ul ul > li::before {
    content: "";
    position: absolute;
    left: -15px;
    top: 10px;
    width: 10px;
    height: 1px;
    background: var(--accent-cyan-border-idle);
  }

  .hud-toc-container nav ul li a {
    color: var(--accent-cyan) !important;
    font-size: 0.75rem !important;
    font-family: var(--primary_font) !important;
    text-transform: uppercase;
    text-decoration: none !important;
    transition: all 0.3s ease;
    opacity: 0.7;
    display: inline-block;
    padding: 2px 0;
  }

  .hud-toc-container nav ul li a:hover,
  .hud-toc-container nav ul li a.active {
    color: var(--text-cyan-active) !important;
    opacity: 1;
    transform: translateX(4px);
    text-shadow: 0 0 8px var(--glow-cyan-active);
  }
</style>
