{{ if site.Params.cookies.enable }}
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/3.0.5/js.cookie.min.js" integrity="sha512-nlp9/l96/EpjYBx7EP7pGASVXNe80hGhYAUrjeXnu/fyF5Py0/RXav4BBNs7n5Hx1WFhOEOWSAVjGeC3oKxDVQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<div id="js-cookie-box" class="cookie-box cookie-box-hide glass-panel">
  <div class="container d-flex flex-column flex-md-row align-items-center justify-content-center gap-3">
    <span class="auth-text">
      <span class="text-cyan-glitch">[!] NOTICE:</span> CORTEX DATA TRACKING AUTHORIZATION REQUIRED. 
      <small class="d-block d-md-inline opacity-75">CONTINUED SESSION CONSTITUTES CONSENT.</small>
    </span>
    <span id="js-cookie-button" class="hud-button btn-sm">I ACCEPT</span>
  </div>
</div>

<script>
  (function () {
    const cookieBox = document.getElementById('js-cookie-box');
    const cookieButton = document.getElementById('js-cookie-button');
    if (!Cookies.get('cookie-box')) {
      cookieBox.classList.remove('cookie-box-hide');
      cookieButton.onclick = function () {
        Cookies.set('cookie-box', true, {
          expires: {{ site.Params.cookies.expire_days }}
        });
        cookieBox.classList.add('cookie-box-hide');
      };
    }
  })();
</script>

<style>
  .cookie-box {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 9999;
    padding: 1.5rem 2rem;
    background: var(--bg-glass-panel) !important;
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-top: 1px solid var(--accent-cyan-border-idle);
    transition: all .75s cubic-bezier(.19, 1, .22, 1);
    color: var(--accent-cyan);
    font-family: var(--primary_font);
  }

  .auth-text {
    font-size: 0.85rem;
    letter-spacing: 0.5px;
  }

  .text-cyan-glitch {
    color: var(--text-cyan-active);
    font-weight: bold;
    text-shadow: 0 0 8px var(--glow-cyan-active);
  }

  .cookie-box-hide {
    transform: translateY(100%);
    opacity: 0;
    pointer-events: none;
  }

  #js-cookie-button {
    min-width: 120px;
    justify-content: center;
    border-color: var(--accent-cyan);
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    padding: 8px 16px;
    background: rgba(0, 0, 0, 0.3);
    color: var(--accent-cyan);
    transition: all 0.3s ease;
  }
  
  #js-cookie-button:hover {
    box-shadow: 0 0 15px var(--glow-cyan-active);
    background: var(--accent-cyan-bg-active);
    color: var(--text-cyan-active);
  }
</style>
{{ end }}
