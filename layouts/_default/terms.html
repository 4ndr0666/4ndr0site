{{ define "main" }}

<section class="section 4ndr0-taxonomy-env">
  <div class="container">
    <div class="row justify-content-center text-center">
      <div class="col-lg-10">
        
        <div class="taxonomy-header mb-5">
          <h2 class="text-cyan text-uppercase" style="letter-spacing: 4px; font-family: var(--primary_font);">
            {{ if eq .Type "tags" }}TAG_CLOUD{{ else if eq .Type "categories" }}CATEGORY_INDEX{{ else }}{{ .Title }}{{ end }}
          </h2>
          <div class="status-bar" style="font-size: 0.7rem; color: var(--accent-cyan); opacity: 0.6; margin-top: 5px; font-family: var(--primary_font);">
            [ ALL_FRAGMENTS_LOADED ]
          </div>
          <div class="header-scanline" style="width: 100%; height: 2px; background: var(--accent-cyan); margin-top: 15px; box-shadow: 0 0 10px var(--glow-cyan-active);"></div>
        </div>

        <div class="row g-4 justify-content-center">
          {{ range .Data.Terms.ByCount }}
          <div class="col-md-4 col-lg-3">
            <div class="glass-panel taxonomy-tile p-3 h-100 d-flex flex-column justify-content-center transition-base">
              <a class="d-block text-decoration-none" href="{{ .Page.Permalink }}">
                <div class="tile-label mb-2" style="color: var(--text-cyan-active); font-weight: 700; font-size: 0.9rem; letter-spacing: 1px; font-family: var(--primary_font);">
                  {{ .Page.Title | upper }}
                </div>
                <div class="tile-count" style="font-size: 0.65rem; color: var(--accent-cyan); opacity: 0.7; font-family: var(--primary_font);">
                  FRAG_COUNT: {{ .Count }}
                </div>
              </a>
            </div>
          </div>
          {{ end }}
        </div>

      </div>
    </div>
  </div>
</section>

<style>
  /* HARDENED SPECIFICITY NODE */
  .4ndr0-taxonomy-env { 
    font-family: var(--primary_font); 
    min-height: 70vh; 
    padding-top: 3rem;
    background-color: transparent !important;
  }
  
  .taxonomy-tile { 
    background: var(--bg-glass-panel) !important;
    border: 1px solid var(--accent-cyan-border-idle) !important; 
    cursor: pointer; 
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  
  .taxonomy-tile:hover { 
    border-color: var(--accent-cyan) !important; 
    box-shadow: 0 0 15px var(--glow-cyan-active) !important; 
    transform: translateY(-5px);
  }

  .transition-base { 
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
  }

  /* PURGE LEGACY UI ELEMENTS */
  .taxonomy-header + ul,
  .taxonomy-list-junk {
    display: none !important;
  }
</style>

{{ end }}
