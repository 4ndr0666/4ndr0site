baseURL = "https://4ndr0666.github.io/4ndr0site/"
title = "4ndr0666 | Cortex"
languageCode = "en-us"
summaryLength = 70
enableGitInfo = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
    [markup.goldmark.parser]
      attribute = true
      autoHeadingID = true
    [markup.goldmark.extensions]
      definitionList = true
      footnote = true
      linkify = true
      strikethrough = true
      table = true
      taskList = true
      typographer = true

[markup.highlight]
codeFences = true
guessSyntax = true
noClasses = false

[params]
defaultTheme = "dark"
logo = "images/4ndr0arch.png"
logoWidth = 248
logoHeight = 50
favicon = "favicon.ico"
author = "4ndr0666"
description = "Weaponized Static Interface"
copyright = "Copyright © 2026 4ndr0666"
og_image = "images/bannerbackground.webp"
mainSections = ["posts"]
search = true
header_search_layout = "popupable"
menu_align = "right"
sidebar = "right"
code_copy_button = true

[params.variables]
primary_color = "#00E5FF" # --accent-cyan
secondary_color = "#67E8F9" # --text-cyan-active
text_color = "#67E8F9"
text_color_dark = "#050A0F" # --bg-dark-base
body_color = "#050A0F"
border_color = "rgba(0, 229, 255, 0.2)" # --accent-cyan-border-idle
black = "#050A0F"
white = "#ffffff"
light = "rgba(10, 19, 26, 0.25)" # --bg-glass-panel
primary_font = "'Roboto Mono', monospace"
icon_font = "Font Awesome 6 Free"

[params.terminal]
greeting = """
[[b;cyan;]4NDR0666OS :: INITIALIZING...]
Ψ-SYSTEM_ONLINE!

Please enter your credentials:"""
exitLocation = "/"

[params.widgets]
sidebar = ["toc"]

[params.images]
  featured = true
  share = true
  formats = ["webp", "jpg", "png"]

[mediaTypes]
  [mediaTypes."image/webp"]
    suffixes = ["webp"]

[outputFormats]
  [outputFormats.WEBP]
    mediaType = "image/webp"
    isPlainText = false
    isHTML = false

[[params.social]]
name = "GitHub"
link = "https://github.com/4ndr0666"

[banner]
bg_image = "images/bannerbackground.png"
title = "<strong>4NDR0666OS</strong><br>CORTEX UPLINK<br> SYSTEM NOMINAL."
image = "images/4ndr0arch.png"

